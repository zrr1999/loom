[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-case-conflict" },
  { id = "check-executables-have-shebangs" },
  { id = "check-yaml" },
  { id = "check-json" },
  { id = "check-merge-conflict" },
  { id = "destroyed-symlinks" },
  { id = "end-of-file-fixer" },
  { id = "mixed-line-ending" },
  { id = "trailing-whitespace" },
]

[[repos]]
repo = "https://github.com/tombi-toml/tombi-pre-commit"
rev = "v0.7.0"
hooks = [
  { id = "tombi-format", exclude = "^uv\\.lock$" },
  { id = "tombi-lint" },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.14.6"
hooks = [
  { id = "ruff-check", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.33.1"
hooks = [
  { id = "typos", args = ["--force-exclude"] },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "commit-message-format"
name = "commit message format"
entry = "uv run python -m tools.hooks.commit_message_validator"
language = "system"
stages = ["commit-msg"]
always_run = true

[[repos.hooks]]
id = "rumdl"
name = "rumdl markdown lint/fix"
entry = "uvx rumdl check --fix --config .rumdl.toml ."
language = "system"
pass_filenames = false
always_run = true
