[project]
name = "loom"

[agent]
inbox_plan_batch = 10
task_batch = 1
next_wait_seconds = 60.0
next_retries = 5
executor_command = ""
offline_after_minutes = 30
# TODO: resume/reattach-related agent config is still under research.
# Possible future settings may include explicit resume command templates.

[threads]
default_priority = 50

[[hooks]]
builtin = "worker-done-review"
points = ["done"]

# Hook definitions live in `loom-hooks.toml`.
# Use `builtin = "..."` for built-ins or `id = "..."` for repo-local hook ids.
